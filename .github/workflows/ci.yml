name: CI

# Builda e testa os 4 serviços a cada push na main e em todo pull request.
on:
  push:
    branches: [ main ]
  pull_request:

# Cancela execuções anteriores ainda rodando para o mesmo ref (economiza minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      # Um serviço falhando não cancela os outros — vê-se o quadro completo.
      fail-fast: false
      matrix:
        service:
          - orders-service       # roda também os testes de integração (Testcontainers)
          - inventory-service
          - payment-service
          - shipping-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # `verify` cobre unit + integração. Nos serviços participantes (sem failsafe)
      # equivale a `test`. No orders-service sobe Postgres + Kafka via Testcontainers
      # (o runner ubuntu-latest já tem Docker disponível).
      - name: Build & test
        working-directory: ${{ matrix.service }}
        run: mvn -B -ntp verify

  e2e:
    name: e2e saga (4 serviços via docker-compose)
    runs-on: ubuntu-latest
    # Só roda se o build/teste por serviço passou — evita gastar minutos à toa.
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest já traz Docker, Compose v2, curl, jq e uuidgen.
      - name: Teste E2E da saga (caminho feliz + 3 compensações)
        run: ./scripts/e2e-saga.sh
