      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
