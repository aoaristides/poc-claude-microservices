spring:
  application:
    name: shipping-service
  datasource:
    url: jdbc:postgresql://localhost:5435/shipping
    username: shipping
    password: shipping
  jpa:
    hibernate:
      # Flyway é a fonte da verdade do schema; JPA apenas valida o mapeamento.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      compression-type: snappy
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: shipping-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read_committed
      properties:
        max.poll.records: 50
    listener:
      ack-mode: manual
      concurrency: 3

server:
  port: 8083

shipping:
  outbox:
    # Intervalo do OutboxRelay para varrer mensagens pendentes (ms).
    relay-delay-ms: 500
  # Quando true, responde DeliveryFailed para TODO pedido (falha global — uso DEV).
  simulate-failure: false
  # SKU sentinela: dispara DeliveryFailed só para o pedido que o contém (gatilho E2E
  # determinístico e per-request). Mantenha em sincronia com o seed do inventory-service.
  undeliverable-sku: SKU-FAIL-SHIP
  topics:
    commands: shipping.commands.v1
    replies: shipping.replies.v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
